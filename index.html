<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rota Pro Búzios</title><link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mapa.css">
</head>
<body><div class="app"><header class="header">

    <div class="header-top">

        <div class="logo">
            <div class="logo-icon">🗺️</div>

            <div>
                <h1>Rota Pro Búzios</h1>
                <p>Controle inteligente de rotas</p>
            </div>
        </div>

        <div class="offline">ONLINE</div>

    </div>

    <div class="route-summary">

        <div class="summary-card">
            <span>Hotéis</span>
            <h2>12</h2>
        </div>

        <div class="summary-card">
            <span>Entregas</span>
            <h2>8</h2>
        </div>

        <div class="summary-card">
            <span>Coletas</span>
            <h2>4</h2>
        </div>

    </div>

</header>

<h2 class="section-title">Ações rápidas</h2>

<section class="actions">

    <button class="action-btn">
        <div class="action-icon">🧭</div>
        <h3>Gerar rota</h3>
        <p>Organizar sequência automaticamente</p>
    </button>

    <button class="action-btn">
        <div class="action-icon">📍</div>
        <h3>Tudo no mapa</h3>
        <p>Visualizar hotéis ativos</p>
    </button>

    <button class="action-btn">
        <div class="action-icon">🚗</div>
        <h3>Modo rota</h3>
        <p>Exibir trajeto atual</p>
    </button>

    <button class="action-btn">
        <div class="action-icon">📄</div>
        <h3>Relatório final</h3>
        <p>Resumo completo da rota</p>
    </button>

</section>

<section class="map-card">

    <div class="map-header">
        <h2 class="section-title">Mapa da rota</h2>

        <div class="map-buttons">
            <button>Mapa</button>
            <button>Satélite</button>
        </div>
    </div>

    <div id="map"></div>

</section>

<section class="hotels">

    <h2 class="section-title">Hotéis ativos</h2>

    <input type="text" class="search" placeholder="Buscar hotel...">

    <div class="hotel-item">

        <div class="hotel-left">

            <div class="drag">☰</div>

            <div class="hotel-number">1</div>

            <div class="hotel-info">
                <h3>Hotel Atlântico</h3>
                <p>Centro • Prioridade Alta</p>
            </div>

        </div>

        <div class="hotel-actions">
            <div class="tag delivery">Entrega</div>
            <div class="switch"></div>
        </div>

    </div>

    <div class="hotel-item">

        <div class="hotel-left">

            <div class="drag">☰</div>

            <div class="hotel-number">2</div>

            <div class="hotel-info">
                <h3>Pousada Brisa</h3>
                <p>João Fernandes</p>
            </div>

        </div>

        <div class="hotel-actions">
            <div class="tag collect">Coleta</div>
            <div class="switch"></div>
        </div>

    </div>

    <div class="hotel-item">

        <div class="hotel-left">

            <div class="drag">☰</div>

            <div class="hotel-number">3</div>

            <div class="hotel-info">
                <h3>Rio Búzios Resort</h3>
                <p>Geribá</p>
            </div>

        </div>

        <div class="hotel-actions">
            <div class="tag delivery">Entrega</div>
            <div class="switch"></div>
        </div>

    </div>

</section>

<div class="footer-space"></div>

</div><div class="bottom-bar">
    <button class="finish-btn">FINALIZAR ROTA</button>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/dados.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/mapa.js"></script>
<script src="js/rotas.js"></script>
<script src="js/app.js"></script>
</body>
</html>
