<!doctype html>
<html lang="pt-BR">

<head>

  <meta charset="utf-8"/>

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      maximum-scale=1,
      user-scalable=0
    "
  />

  <title>Rota Búzios</title>

  <meta
    name="theme-color"
    content="#0b63b7"
  />

  <link
    rel="stylesheet"
    href="style.css"
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

  <div class="app">

    <header>

      <h1>

        🫧Rota Búzios🚚

      </h1>

    </header>

    <!-- CONTROLES -->

    <section class="card">

      <div class="controls">

        <button id="btn-generate">

          Criar rota

        </button>

        <button
          id="btn-reset"
          class="ghost"
        >

          Limpar

        </button>

      </div>

    </section>

    <!-- HOTÉIS -->

    <section class="card">

      <div
        id="hotelList"
        class="hotel-list"
      ></div>

    </section>

    <!-- MAPA -->

    <section class="card">

      <div
        id="map"
        class="map"
      ></div>

    </section>

    <!-- FOTOS -->

    <section class="card">

      <input
        type="file"
        id="photoInput"
        accept="image/*"
        multiple
      />

      <div
        id="photoPreview"
        class="photo-preview"
      ></div>

    </section>

    <!-- RELATÓRIO -->

    <section class="card">

      <div class="report-header">

        <strong>

          Histórico da rota

        </strong>

        <button
          id="btn-pdf"
          class="ghost"
        >

          PDF

        </button>

      </div>

      <div
        id="reportMode"
        class="report"
      ></div>

    </section>

  </div>

  <!-- LEAFLET -->

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- APP -->

  <script src="dados.js"></script>

  <script src="mapa.js"></script>

  <script src="relatorio.js"></script>

  <script src="app.js"></script>

</body>
</html>
