<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Rota Pro Búzios</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#2563eb">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</head>

<body>

<header>
    <h1 style="margin:0;font-size:1.3rem;">
        🚚 Rota Pro Búzios 🫧
    </h1>

    <button class="btn-add"
            onclick="toggleCadastro()">
        +
    </button>
</header>

<div class="container" id="view-selecao">

    <div id="painel-cadastro">

        <h3 style="margin-top:0">
            Nova Parada
        </h3>

        <div class="input-group">
            <label>Nome</label>
            <input type="text" id="novo-nome">
        </div>

        <div class="input-group">
            <label>Endereço</label>
            <input type="text" id="novo-end">
        </div>

        <div class="input-group">
            <label>Coordenadas (Lat, Lon)</label>

            <input type="text"
                   id="novo-coords"
                   placeholder="-22.7490005, -41.9561384">
        </div>

        <div style="display:flex;gap:10px">

            <button class="btn-gps btn-google"
                    style="flex:1;border:none;cursor:pointer;"
                    onclick="salvarNovoLocal()">
                Salvar
            </button>

            <button class="btn-gps"
                    style="flex:1;border:none;background:#666;cursor:pointer;"
                    onclick="toggleCadastro()">
                Fechar
            </button>

        </div>

    </div>

    <div id="lista-selecao"></div>

    <div class="footer-btns">

        <button class="btn-acao"
                style="background:#dc3545;flex:1;"
                onclick="limparSelecao()">
            Limpar
        </button>

        <button class="btn-acao"
                style="background:var(--success);"
                onclick="gerarRota()">
            🚀 Gerar Rota
        </button>

    </div>

</div>

<div class="container" id="view-rota-ativa">

    <div class="painel-controle">

        <div class="resumo-stats"
             style="display:flex;gap:20px;margin-bottom:15px;">

            <div class="resumo-item">
                <span style="font-size:0.7rem;color:#666;display:block;">
                    DISTÂNCIA
                </span>

                <span class="resumo-valor"
                      id="total-km"
                      style="font-weight:bold;">
                    0 km
                </span>
            </div>

            <div class="resumo-item">
                <span style="font-size:0.7rem;color:#666;display:block;">
                    TEMPO EST.
                </span>

                <span class="resumo-valor"
                      id="total-tempo"
                      style="font-weight:bold;">
                    0 min
                </span>
            </div>

        </div>

        <div id="gps-info"></div>

        <div id="hotel-proximo"
             class="gps-box"
             style="display:none;">
        </div>

        <div class="btn-gps-group">

    <a id="btn-full-google"
       href="#"
       target="_blank"
       class="btn-gps btn-google">
        Tudo no Maps
    </a>

    <a id="btn-full-waze"
       href="#"
       target="_blank"
       class="btn-gps btn-waze">
        Final no Waze
    </a>

</div>

<button class="btn-acao"
        id="btn-modo-rota"
        onclick="iniciarModoRota()"
        style="margin-top:15px;width:100%;">

    🚚 Modo em Rota

</button>

    </div>

    <div id="lista-rota-ativa"></div>
<div id="modo-rota"
     style="display:none;">

    <div class="gps-box">

        <div style="font-size:0.8rem;color:#666;">
            PRÓXIMO HOTEL
        </div>

        <h2 id="hotel-atual-nome">
            --
        </h2>

        <div id="hotel-atual-regiao"></div>

        <div style="
            margin-top:15px;
            font-size:1.2rem;
            font-weight:bold;">

            ⏱ <span id="tempo-hotel">
                00:00
            </span>

        </div>

        <div class="btn-gps-group"
             style="margin-top:15px;">

            <button class="btn-gps btn-google"
                    onclick="navegarHotelAtual()">

                🧭 Navegar

            </button>

            <button class="btn-gps"
                    style="background:var(--success)"
                    onclick="marcarEntregue()">

                ✅ Entregue

            </button>

            <button class="btn-gps"
                    style="background:#f59e0b"
                    onclick="marcarColetado()">

                📦 Coletado

            </button>

        </div>

        <button class="btn-acao"
                style="margin-top:15px;"
                onclick="proximoHotel()">

            ⏭ Próximo Hotel

        </button>

    </div>

</div>

    <button class="btn-acao"
            onclick="voltarSelecao()"
            style="background:#666;width:100%;margin-top:20px;">
        ✎ Editar Lista
    </button>

</div>

<div class="overlay" id="overlay"></div>

<div id="modal-next">

    <h2>Próxima parada</h2>

    <p id="next-stop-name"
       style="font-weight:bold;color:var(--primary);font-size:1.2rem;">
    </p>

    <div class="btn-gps-group">

        <a id="modal-google"
           href="#"
           target="_blank"
           class="btn-gps btn-google">
            Maps
        </a>

        <a id="modal-waze"
           href="#"
           target="_blank"
           class="btn-gps btn-waze">
            Waze
        </a>

    </div>

    <button onclick="fecharModal()"
            style="margin-top:15px;
                   padding:10px 20px;
                   background:#eee;
                   border-radius:8px;
                   border:none;
                   cursor:pointer;
                   font-weight:bold;">

        Fechar

    </button>

</div>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}
</script>

<script src="dados.js"></script>

<script src="funcoes.js"></script>

<script src="app.js"></script>

</body>
</html>
