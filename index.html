<!doctype html>
<html lang="pt-BR">

<head>

  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  />

  <title>
    Rota Búzios
  </title>

  <meta
    name="theme-color"
    content="#0b63b7"
  />

  <link
    rel="manifest"
    href="./manifest.json"
  />

  <link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/telaSelecao.css">
<link rel="stylesheet" href="css/telaRota.css">
<link rel="stylesheet" href="css/telaNavegacao.css">
<link rel="stylesheet" href="css/telaRelatorio.css">
<link rel="stylesheet" href="css/responsive.css">

  <!-- MAPLIBRE -->

  <link
    href="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <script src="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.js"></script>

</head>

<body>

  <div class="app">

    <!-- ===================== -->
    <!-- TELA SELEÇÃO -->
    <!-- ===================== -->

    <section
      id="tela-selecao"
      class="screen active"
    >

      <header class="topbar">

        <h1>
          Rota Búzios
        </h1>

        <div
          id="contador-selecao"
          class="hotel-counter"
        >
          0 hotéis ativos
        </div>
      </header>
<div class="bottom-actions">

        <button id="btn-adicionar-hotel">
          + Hotel
        </button>

        <button id="btn-criar-rota">
          Criar rota
        </button>

        <button id="btn-limpar">
          Limpar
        </button>

      </div>
      <div
        id="lista-hoteis"
        class="list"
      ></div>
    </section>


    <!-- ===================== -->
    <!-- TELA ROTA -->
    <!-- ===================== -->

    <section
      id="tela-rota"
      class="screen hidden"
    >

      <header class="topbar">

        <button id="btn-voltar">
          ←
        </button>

        <div
          id="contador-rota"
          class="hotel-counter"
        >
          0 hotéis ativos
        </div>
      </header>
<div class="bottom-actions">

        <button id="btn-iniciar-rota">
          Iniciar rota
        </button>

        <button id="btn-exportar">
          Exportar
        </button>

      </div>

      <div
        id="lista-rota"
        class="route-list"
      ></div>

      <div
        id="lista-relatorio-rota"
        class="report"
      ></div>

    </section>


    <!-- ===================== -->
    <!-- TELA NAVEGAÇÃO -->
    <!-- ===================== -->

    <section
      id="tela-navegacao"
      class="screen hidden"
    >

      <div id="mapa"></div>

      <button
        id="follow-btn"
        class="active"
      >
        Centralizar
      </button>

      <div class="map-controls">

        <label class="switch">

          <input
            type="checkbox"
            id="toggle-voz"
          />

          <span class="slider"></span>

        </label>

      </div>

      <div
        id="hotel-atual"
        class="card"
      ></div>

      <div
        id="proximos-hoteis"
        class="next-two"
      ></div>

      <div class="check-group">

        <label class="check-card">

          <input
            type="checkbox"
            id="check-entrega"
          />

          Entrega

        </label>

        <label class="check-card">

          <input
            type="checkbox"
            id="check-coleta"
          />

          Coleta

        </label>

      </div>

      <div class="photo-section">

        <div class="photo-upload-group">

          <label class="camera-button">

            📷

            <input
              type="file"
              id="input-fotos-entrega"
              accept="image/*"
              multiple
              hidden
            />

          </label>

          <div
            id="preview-entrega"
            class="photo-preview"
          ></div>

        </div>

        <div class="photo-upload-group">

          <label class="camera-button">

            📷

            <input
              type="file"
              id="input-fotos-coleta"
              accept="image/*"
              multiple
              hidden
            />

          </label>

          <div
            id="preview-coleta"
            class="photo-preview"
          ></div>

        </div>

      </div>

      <div
        id="relatorio-modo"
        class="report"
      ></div>

      <div class="bottom-actions">

        <button id="btn-google-maps">
          Google Maps
        </button>

        <button id="btn-proximo">
          Próximo hotel
        </button>

        <button id="btn-finalizar">
          Finalizar
        </button>

      </div>

    </section>


    <!-- ===================== -->
    <!-- TELA RELATÓRIO -->
    <!-- ===================== -->

    <section
      id="tela-relatorio"
      class="screen hidden"
    >

      <header class="report-header">

        <h1 id="titulo-relatorio">
          Relatório
        </h1>

      </header>

      <div
        id="lista-relatorio-final"
        class="report-route-list"
      ></div>

      <div class="report-bottom-actions">

        <button id="btn-exportar-pdf">
          Exportar PDF
        </button>

        <button id="btn-nova-rota">
          Nova rota
        </button>

      </div>

    </section>


    <!-- ===================== -->
    <!-- MODAL -->
    <!-- ===================== -->

    <div
      id="modal-hotel"
      class="modal"
    >

      <div class="modal-content">

        <h3>
          Novo hotel
        </h3>

        <input
          id="input-nome-hotel"
          placeholder="Nome do hotel"
        />

        <input
          id="input-regiao-hotel"
          placeholder="Região"
        />

        <input
          id="input-endereco-hotel"
          placeholder="Endereço"
        />

        <input
          id="input-coords-hotel"
          placeholder="-22.000,-41.000"
        />

        <div class="modal-actions">

          <button
            id="btn-fechar-modal"
            class="ghost"
          >
            Cancelar
          </button>

          <button id="btn-salvar-hotel">
            Salvar
          </button>

        </div>

      </div>

    </div>

  </div>

  <script
    type="module"
    src="./main.js"
  ></script>

</body>

</html>
