<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
  />

  <title>Rota Búzios — Entregas</title>

  <meta name="theme-color" content="#0b63b7"/>

  <link rel="manifest" href="manifest.json" />

  <!-- Sortable -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <header>
    <h1>
      <i data-lucide="map"></i>
      Rota Búzios
    </h1>

    <div class="status-badge">
      Offline PWA
    </div>
  </header>

  <!-- SELEÇÃO -->

  <section id="screen-select" class="card">

    <div class="header-text">
      <strong>Selecione os hotéis</strong>
      <div class="muted">
        Ative os pontos de parada para a rota.
      </div>
    </div>

    <div class="controls">

      <button id="btn-generate">
        <i data-lucide="route"></i>
        Criar Rota
      </button>

      <button id="btn-reset" class="ghost">
        <i data-lucide="trash-2"></i>
        Limpar
      </button>

    </div>

    <div class="list" id="hotelList"></div>

  </section>

  <!-- ROTA -->

  <section id="screen-route" class="card hidden">

    <div class="header-text">
      <strong>Organize a rota</strong>

      <div class="muted">
        Segure e arraste para mudar a ordem.
      </div>
    </div>

    <div class="controls">

      <button id="btn-start-route">
        <i data-lucide="play"></i>
        Iniciar
      </button>

      <button id="btn-google" class="ghost">
        <i data-lucide="map-pin"></i>
        Maps
      </button>

    </div>

    <div class="route-list" id="routeList"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;">

      <button id="btn-back" class="ghost" style="flex:0 1 auto;">
        <i data-lucide="arrow-left"></i>
        Voltar
      </button>

      <span class="status-badge" id="activeCount"></span>

    </div>

  </section>

  <!-- MODO ROTA -->

  <section id="screen-mode" class="card hidden">

    <div
      class="header-text"
      style="display:flex;justify-content:space-between;align-items:center;"
    >

      <div>
        <strong>Modo Viagem</strong>

        <div class="muted">
          Registre os serviços.
        </div>
      </div>

      <button
        id="btn-finish"
        class="ghost"
        style="flex:0 1 auto;"
      >
        Encerrar
      </button>

    </div>

    <div
      id="currentHotel"
      style="
        background:var(--accent);
        color:white;
        padding:20px;
        border-radius:12px;
        margin-bottom:20px;
      "
    ></div>

    <div
      style="
        background:#f8fafc;
        border:1px solid var(--border);
        padding:16px;
        border-radius:12px;
        margin-bottom:20px;
      "
    >

      <label class="custom-checkbox">
        <input type="checkbox" id="chk-entrega">
        <span>Entrega</span>
      </label>

      <label class="custom-checkbox">
        <input type="checkbox" id="chk-coleta">
        <span>Coleta</span>
      </label>

      <button id="btn-next" style="margin-top:16px;width:100%;">
        <i data-lucide="check-circle"></i>
        Confirmar
      </button>

    </div>

    <div
      class="header-text"
      style="display:flex;justify-content:space-between;align-items:center;"
    >

      <strong>Histórico</strong>

      <button
        id="btn-pdf"
        class="ghost"
        style="flex:0 1 auto;"
      >
        <i data-lucide="file-text"></i>
        PDF
      </button>

    </div>

    <div class="report" id="reportMode"></div>

  </section>

</div>

<script src="app.js"></script>

</body>
</html>
