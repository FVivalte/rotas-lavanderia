<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rota Pro Búzios</title><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --blue:#2563eb;
    --blue-dark:#1e3a8a;
    --blue-light:#dbeafe;
    --white:#ffffff;
    --bg:#f5f9ff;
    --text:#1e293b;
    --gray:#64748b;
    --shadow:0 4px 12px rgba(0,0,0,.08);
    --radius:18px;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:14px;
}

.app{
    max-width:700px;
    margin:auto;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:white;
    border-radius:24px;
    padding:22px;
    box-shadow:var(--shadow);
    margin-bottom:18px;
}

.header-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-icon{
    width:52px;
    height:52px;
    border-radius:16px;
    background:rgba(255,255,255,.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}

.logo h1{
    font-size:22px;
    font-weight:700;
}

.logo p{
    font-size:13px;
    opacity:.85;
}

.offline{
    background:#22c55e;
    padding:8px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
}

.route-summary{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

.summary-card{
    background:rgba(255,255,255,.15);
    padding:14px;
    border-radius:18px;
    backdrop-filter:blur(8px);
}

.summary-card span{
    font-size:12px;
    opacity:.8;
}

.summary-card h2{
    margin-top:6px;
    font-size:22px;
}

/* ACTIONS */
.section-title{
    font-size:18px;
    margin-bottom:12px;
    font-weight:700;
}

.actions{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
    margin-bottom:20px;
}

.action-btn{
    border:none;
    background:white;
    border-radius:20px;
    padding:18px;
    text-align:left;
    box-shadow:var(--shadow);
    transition:.2s;
}

.action-btn:active{
    transform:scale(.98);
}

.action-icon{
    width:52px;
    height:52px;
    border-radius:16px;
    background:var(--blue-light);
    color:var(--blue);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    margin-bottom:12px;
}

.action-btn h3{
    font-size:16px;
    margin-bottom:4px;
}

.action-btn p{
    font-size:13px;
    color:var(--gray);
}

/* MAP */
.map-card{
    background:white;
    border-radius:24px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:20px;
}

.map-header{
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.map-buttons{
    display:flex;
    gap:10px;
}

.map-buttons button{
    border:none;
    background:var(--blue-light);
    color:var(--blue-dark);
    padding:10px 14px;
    border-radius:12px;
    font-weight:600;
    font-size:12px;
}

.fake-map{
    height:240px;
    background:linear-gradient(135deg,#dbeafe,#bfdbfe);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--blue-dark);
    font-size:18px;
    font-weight:700;
}

/* HOTEL LIST */
.hotels{
    background:white;
    border-radius:24px;
    padding:18px;
    box-shadow:var(--shadow);
}

.search{
    width:100%;
    border:none;
    background:#f1f5f9;
    padding:16px;
    border-radius:16px;
    margin-bottom:16px;
    font-size:15px;
}

.hotel-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px;
    background:#f8fbff;
    border-radius:18px;
    margin-bottom:12px;
}

.hotel-left{
    display:flex;
    align-items:center;
    gap:14px;
}

.drag{
    font-size:20px;
    color:#94a3b8;
}

.hotel-number{
    width:42px;
    height:42px;
    border-radius:14px;
    background:var(--blue);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
}

.hotel-info h3{
    font-size:15px;
}

.hotel-info p{
    font-size:13px;
    color:var(--gray);
    margin-top:3px;
}

.hotel-actions{
    display:flex;
    gap:8px;
}

.tag{
    padding:8px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
}

.delivery{
    background:#dbeafe;
    color:#1d4ed8;
}

.collect{
    background:#dcfce7;
    color:#15803d;
}

.switch{
    width:48px;
    height:28px;
    background:#2563eb;
    border-radius:999px;
    position:relative;
}

.switch::after{
    content:'';
    width:22px;
    height:22px;
    background:white;
    border-radius:50%;
    position:absolute;
    right:3px;
    top:3px;
}

/* FOOTER */
.footer-space{
    height:90px;
}

.bottom-bar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    padding:14px;
    box-shadow:0 -4px 12px rgba(0,0,0,.08);
}

.finish-btn{
    width:100%;
    border:none;
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:white;
    padding:18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
}

@media(max-width:480px){

    .route-summary{
        grid-template-columns:1fr;
    }

    .actions{
        grid-template-columns:1fr;
    }

}
</style></head>
<body><div class="app"><header class="header">

    <div class="header-top">

        <div class="logo">
            <div class="logo-icon">🗺️</div>

            <div>
                <h1>Rota Pro Búzios</h1>
                <p>Controle inteligente de rotas</p>
            </div>
        </div>

        <div class="offline">ONLINE</div>

    </div>

    <div class="route-summary">

        <div class="summary-card">
            <span>Hotéis</span>
            <h2>12</h2>
        </div>

        <div class="summary-card">
            <span>Entregas</span>
            <h2>8</h2>
        </div>

        <div class="summary-card">
            <span>Coletas</span>
            <h2>4</h2>
        </div>

    </div>

</header>

<h2 class="section-title">Ações rápidas</h2>

<section class="actions">

    <button class="action-btn">
        <div class="action-icon">🧭</div>
        <h3>Gerar rota</h3>
        <p>Organizar sequência automaticamente</p>
    </button>

    <button class="action-btn">
        <div class="action-icon">📍</div>
        <h3>Tudo no mapa</h3>
        <p>Visualizar hotéis ativos</p>
    </button>

    <button class="action-btn">
        <div class="action-icon">🚗</div>
        <h3>Modo rota</h3>
        <p>Exibir trajeto atual</p>
    </button>

    <button class="action-btn">
        <div class="action-icon">📄</div>
        <h3>Relatório final</h3>
        <p>Resumo completo da rota</p>
    </button>

</section>

<section class="map-card">

    <div class="map-header">
        <h2 class="section-title">Mapa da rota</h2>

        <div class="map-buttons">
            <button>Mapa</button>
            <button>Satélite</button>
        </div>
    </div>

    <div class="fake-map">
        MAPA INTERATIVO
    </div>

</section>

<section class="hotels">

    <h2 class="section-title">Hotéis ativos</h2>

    <input type="text" class="search" placeholder="Buscar hotel...">

    <div class="hotel-item">

        <div class="hotel-left">

            <div class="drag">☰</div>

            <div class="hotel-number">1</div>

            <div class="hotel-info">
                <h3>Hotel Atlântico</h3>
                <p>Centro • Prioridade Alta</p>
            </div>

        </div>

        <div class="hotel-actions">
            <div class="tag delivery">Entrega</div>
            <div class="switch"></div>
        </div>

    </div>

    <div class="hotel-item">

        <div class="hotel-left">

            <div class="drag">☰</div>

            <div class="hotel-number">2</div>

            <div class="hotel-info">
                <h3>Pousada Brisa</h3>
                <p>João Fernandes</p>
            </div>

        </div>

        <div class="hotel-actions">
            <div class="tag collect">Coleta</div>
            <div class="switch"></div>
        </div>

    </div>

    <div class="hotel-item">

        <div class="hotel-left">

            <div class="drag">☰</div>

            <div class="hotel-number">3</div>

            <div class="hotel-info">
                <h3>Rio Búzios Resort</h3>
                <p>Geribá</p>
            </div>

        </div>

        <div class="hotel-actions">
            <div class="tag delivery">Entrega</div>
            <div class="switch"></div>
        </div>

    </div>

</section>

<div class="footer-space"></div>

</div><div class="bottom-bar">
    <button class="finish-btn">FINALIZAR ROTA</button>
</div><script>
console.log('Rota Pro Búzios iniciado');
</script></body>
</html>
