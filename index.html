<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  />
  <title>Rota Búzios</title>
  <meta
    name="theme-color"
    content="#0b63b7"
  />
  <link
    rel="manifest"
    href="manifest.json"
  />
  <link
    rel="stylesheet"
    href="style.css"
  />
  
  <!-- MAPLIBRE GL -->
  <link
  href="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.css"
  rel="stylesheet"
/>

<script src="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.js"></script>
  <!-- LEAFLET -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- LEAFLET ROUTING -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"
  />
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
  
  <!-- HTML2CANVAS -->
  
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <!-- JSPDF -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
  <!-- ===================== -->
  <!-- TELA SELEÇÃO -->
  <!-- ===================== -->

 <section id="screen-select" class="screen">

  <header class="topbar">

    <h1>
      Rota Búzios
    </h1>

    <div id="activeCountSelect">
      0 hotéis ativos
    </div>

  </header>

  <!-- PAINEL -->

  <div id="homeScreen">

    <!-- BOTÕES -->

    <div class="bottom-actions">

      <button id="btn-Add-Hotel">
        + Hotel
      </button>

      <button id="btn-Create-Route">
        Criar rota
      </button>

      <button id="btn-Clear">
        Limpar
      </button>

    </div>

    <!-- LISTA -->

    <div id="hotelList"></div>

  </div>

</section>


  <!-- ===================== -->
  <!-- TELA ROTA -->
  <!-- ===================== -->

  <section
    id="screen-route"
    class="hidden">

    <header class="topbar">

      <button id="btn-back">
        ←
      </button>

      <div id="activeCountRoute">
        0 hotéis ativos
      </div>

    </header>

    <div id="routeList"></div>

    <div class="bottom-actions">

      <button id="btn-start-route">
        Iniciar rota
      </button>

      <button id="btn-export">
        Exportar
      </button>

    </div>

  </section>


  <!-- ===================== -->
  <!-- TELA NAVEGAÇÃO -->
  <!-- ===================== -->

  <section
    id="screen-mode"
    class="hidden"
  >
<div id="map"></div>
<div class="map-controls">
  <button id="btnLocate">
    📍
  </button>
  <label class="voice-toggle">
    <input type="checkbox" id="voiceToggle">
    <span>Voz</span>
  </label>
</div>
    <div id="currentHotel"></div>
    <div id="nextTwo"></div>
    <div class="mode-actions">
      <label>
        <input
          type="checkbox"
          id="chk-entrega"
        />
        Entrega
      </label>

      <label>

        <input
          type="checkbox"
          id="chk-coleta"
        />

        Coleta

      </label>

    </div>

    <div class="photo-area">

      <label class="camera-btn">

        📷

        <input
          type="file"
          id="deliveryPhotosInput"
          accept="image/*"
          multiple
          hidden
        />

      </label>

      <div id="deliveryPreview"></div>

      <label class="camera-btn">

        📷

        <input
          type="file"
          id="pickupPhotosInput"
          accept="image/*"
          multiple
          hidden
        />

      </label>

      <div id="pickupPreview"></div>

    </div>

    <div id="reportMode"></div>

    <div class="bottom-actions">

      <button id="btn-open-maps">
        Google Maps
      </button>

      <button id="btn-next">
        Próximo hotel
      </button>

      <button id="btn-finish">
        Finalizar
      </button>

    </div>

  </section>


  <!-- ===================== -->
  <!-- TELA RELATÓRIO -->
  <!-- ===================== -->

  <section
    id="screen-report"
    class="hidden"
  >

    <header class="topbar">

      <h2 id="reportTitle">
        Relatório
      </h2>

    </header>

    <div id="reportRouteList"></div>

    <div class="bottom-actions">

      <button id="btnExportPdf">
        Exportar PDF
      </button>

      <button id="btnNewRoute">
        Nova rota
      </button>

    </div>

  </section>


  <!-- ===================== -->
  <!-- MODAL HOTEL -->
  <!-- ===================== -->

  <div
    id="hotelModal"
    class="modal"
  >

    <div class="modal-content">

      <h3>
        Novo hotel
      </h3>

      <input
        id="newName"
        placeholder="Nome"
      />

      <input
        id="newRegion"
        placeholder="Região"
      />

      <input
        id="newAddress"
        placeholder="Endereço"
      />

      <input
        id="newCoords"
        placeholder="Lat,Lng"
      />

      <div class="modal-actions">

        <button id="closeModal">
          Cancelar
        </button>

        <button id="saveHotel">
          Salvar
        </button>

      </div>

    </div>

  </div>


  <!-- ===================== -->
  <!-- MAIN -->
  <!-- ===================== -->

  <script
    type="module"
    src="./main.js"
  ></script>

</body>

</html>
