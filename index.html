<!doctype html>
<html lang="pt-BR">

<head>

  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  />

  <title>
    Rota Búzios
  </title>

  <meta
    name="theme-color"
    content="#0b63b7"
  />

  <link
    rel="manifest"
    href="./manifest.json"
  />

  <link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/telaSelecao.css">
<link rel="stylesheet" href="css/telaRota.css">
<link rel="stylesheet" href="css/telaNavegacao.css">
<link rel="stylesheet" href="css/telaRelatorio.css">
<link rel="stylesheet" href="css/responsive.css">

  <!-- MAPLIBRE -->

  <link
    href="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <script src="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.js"></script>

</head>

<body>

  <div class="app">

    <!-- ===================== -->
    <!-- TELA SELEÇÃO -->
    <!-- ===================== -->

    <section id="tela-selecao" class="screen active">

  <div class="tela1-header">
    <h1>Rota Búzios</h1>

    <div id="contador-selecao" class="hotel-counter">
      0 hotéis ativos
    </div>
  </div>

  <div class="tela1-actions">
    <button id="btn-adicionar-hotel">+ Hotel</button>
    <button id="btn-criar-rota">Criar rota</button>
    <button id="btn-limpar">Limpar</button>
  </div>

  <div
  id="lista-hoteis"
  class="list tela1-lista"
></div>

</section>


    <!-- ===================== -->
    <!-- TELA ROTA -->
    <!-- ===================== -->

    <section id="tela-rota" class="screen hidden">

  <div class="tela2-topbar">

    <div id="contador-rota" class="hotel-counter">
      0 hotéis ativos
    </div>

    <button id="btn-voltar">
      ←
    </button>

  </div>

  <div
  id="mapa-rota"></div>
  <div
  id="lista-rota"
  class="tela2-lista"
></div>    
  <div class="tela2-actions">

    <button id="btn-iniciar-rota">
      Iniciar rota
    </button>

    <button id="btn-exportar">
      Exportar
    </button>

  </div>

</section>

<!-- ===================== -->
<!-- TELA NAVEGAÇÃO -->
<!-- ===================== -->

<section
  id="tela-navegacao"
  class="screen hidden"
>

  <button
    id="follow-btn"
    class="active"
  >
    Centralizar
  </button>

  <!-- VOZ -->

  <div class="voice-bar">

    <span>
      🔊 Voz Navegação
    </span>

    <label class="switch">
    <div id="route-info">

  <span id="distance-info">
    --
  </span>

  <span id="duration-info">
    --
  </span>

</div>

      <input
        type="checkbox"
        id="toggle-voz"
      >

      <span class="slider"></span>

    </label>

  </div>

  <!-- ENTREGA / COLETA -->

  <div class="delivery-bar">

    <label class="delivery-item">

      <input
        type="checkbox"
        id="check-entrega"
      >

      <span>
        📦 Entrega
      </span>

    </label>

    <label class="delivery-item">

      <input
        type="checkbox"
        id="check-coleta"
      >

      <span>
        ♻️ Coleta
      </span>

    </label>

  </div>

  <!-- MAPA -->

  <div id="mapa"></div>
<!-- FOTOS -->

<div class="photos-section">

  <div class="photo-box">

    <label
      for="input-fotos-entrega"
      class="camera-btn"
    >
      📷 Entrega
    </label>

    <input
      type="file"
      id="input-fotos-entrega"
      accept="image/*"
      capture="environment"
      multiple
      hidden
    >

    <div id="preview-entrega"></div>

  </div>

  <div class="photo-box">

    <label
      for="input-fotos-coleta"
      class="camera-btn"
    >
      📷 Coleta
    </label>

    <input
      type="file"
      id="input-fotos-coleta"
      accept="image/*"
      capture="environment"
      multiple
      hidden
    >

    <div id="preview-coleta"></div>

  </div>

</div>
  
  <!-- BOTÕES -->

  <div class="nav-bottom-actions">

    <button id="btn-google-maps">
      Google Maps
    </button>

    <button id="btn-proximo">
      Próximo Hotel
    </button>

    <button id="btn-finalizar">
      Finalizar
    </button>

  </div>

</section>
    <!-- ===================== -->
    <!-- TELA RELATÓRIO -->
    <!-- ===================== -->

    <section id="tela-relatorio" class="screen hidden">
      <div class="card">
        <h2>📋 Relatório Final</h2>
        <div class="info">
          <p><strong>Hotel:</strong> <span id="relHotel"></span></p>
          <p><strong>Data:</strong> <span id="relData"></span></p>
          <p><strong>Hora:</strong> <span id="relHora"></span></p>
        </div>
        <div class="resumo">
          <div class="stat">
            <span>📦 Entregas</span>
            <strong id="relEntregas">0</strong>
          </div>
          <div class="stat">
            <span>♻️ Coletas</span>
            <strong id="relColetas">0</strong>
          </div>
          <div class="stat">
            <span>📸 Fotos</span>
            <strong id="relFotos">0</strong>
          </div>
        </div>
        <label>📝 Observações</label>
        <textarea
      id="relObservacoes"
      rows="5"
      placeholder="Digite observações da visita...">
          
        </textarea>
        <button id="btnPdf" class="btn-primary">
      📄 Exportar PDF
        </button>
        <button id="btnNovaRota" class="btn-secondary">
      🔄 Nova Rota
        </button>
    <div id="lista-relatorio-final"></div>
        
      </div>

</section>


    <!-- ===================== -->
    <!-- MODAL -->
    <!-- ===================== -->

    <div
      id="modal-hotel"
      class="modal"
    >

      <div class="modal-content">

        <h3>
          Novo hotel
        </h3>

        <input
          id="input-nome-hotel"
          placeholder="Nome do hotel"
        />

        <input
          id="input-regiao-hotel"
          placeholder="Região"
        />

        <input
          id="input-endereco-hotel"
          placeholder="Endereço"
        />

        <input
          id="input-coords-hotel"
          placeholder="-22.000,-41.000"
        />

        <div class="modal-actions">

          <button
            id="btn-fechar-modal"
            class="ghost"
          >
            Cancelar
          </button>

          <button id="btn-salvar-hotel">
            Salvar
          </button>

        </div>

      </div>

    </div>

  </div>

  <script type="module" src="main.js" defer></script>
</body>

</html>
