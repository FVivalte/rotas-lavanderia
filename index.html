<!doctype html>
<html lang="pt-BR">

<head>

  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  />

  <title>
    Rota Búzios
  </title>

  <meta
    name="theme-color"
    content="#0b63b7"
  />

  <link
    rel="manifest"
    href="manifest.json"
  />

  <link
    rel="stylesheet"
    href="style.css"
  />

  <!-- MAPLIBRE -->

  <link
    href="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <script src="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.js"></script>

</head>

<body>

  <!-- ===================== -->
  <!-- TELA SELEÇÃO -->
  <!-- ===================== -->

  <section
    id="tela-selecao"
    class="screen"
  >

    <header class="topbar">

      <h1>
        Rota Búzios
      </h1>

      <div id="contadorSelecao">
        0 hotéis ativos
      </div>

    </header>

    <div id="painelInicial">

      <div id="listaHoteis"></div>

      <div class="bottom-actions">

        <button id="btn-adicionar-hotel">
          + Hotel
        </button>

        <button id="btn-criar-rota">
          Criar rota
        </button>

        <button id="btn-limpar">
          Limpar
        </button>

      </div>

    </div>

  </section>


  <!-- ===================== -->
  <!-- TELA ROTA -->
  <!-- ===================== -->

  <section
    id="tela-rota"
    class="screen hidden"
  >

    <header class="topbar">

      <button id="btn-voltar">
        ←
      </button>

      <div id="contadorRota">
        0 hotéis ativos
      </div>

    </header>

    <div id="listaRota"></div>

    <div id="listaRelatorioRota"></div>

    <div class="bottom-actions">

      <button id="btn-iniciar-rota">
        Iniciar rota
      </button>

      <button id="btn-exportar">
        Exportar
      </button>

    </div>

  </section>


  <!-- ===================== -->
  <!-- TELA NAVEGAÇÃO -->
  <!-- ===================== -->

  <section
    id="tela-navegacao"
    class="screen hidden"
  >

    <div id="mapa"></div>

    <div class="map-controls">

      <button id="btn-localizar">
        📍
      </button>

      <label class="voice-toggle">

        <input
          type="checkbox"
          id="toggle-voz"
        />

        <span>
          Voz
        </span>

      </label>

    </div>

    <div id="hotelAtual"></div>

    <div id="proximosHoteis"></div>

    <div class="mode-actions">

      <label>

        <input
          type="checkbox"
          id="check-entrega"
        />

        Entrega

      </label>

      <label>

        <input
          type="checkbox"
          id="check-coleta"
        />

        Coleta

      </label>

    </div>

    <div class="photo-area">

      <label class="camera-btn">

        📷

        <input
          type="file"
          id="inputFotosEntrega"
          accept="image/*"
          multiple
          hidden
        />

      </label>

      <div id="previewEntrega"></div>

      <label class="camera-btn">

        📷

        <input
          type="file"
          id="inputFotosColeta"
          accept="image/*"
          multiple
          hidden
        />

      </label>

      <div id="previewColeta"></div>

    </div>

    <div id="relatorioModo"></div>

    <div class="bottom-actions">

      <button id="btn-google-maps">
        Google Maps
      </button>

      <button id="btn-proximo">
        Próximo hotel
      </button>

      <button id="btn-finalizar">
        Finalizar
      </button>

    </div>

  </section>


  <!-- ===================== -->
  <!-- TELA RELATÓRIO -->
  <!-- ===================== -->

  <section
    id="tela-relatorio"
    class="screen hidden"
  >

    <header class="topbar">

      <h2 id="tituloRelatorio">
        Relatório
      </h2>

    </header>

    <div id="listaRelatorioFinal"></div>

    <div class="bottom-actions">

      <button id="btn-exportar-pdf">
        Exportar PDF
      </button>

      <button id="btn-nova-rota">
        Nova rota
      </button>

    </div>

  </section>


  <!-- ===================== -->
  <!-- MODAL HOTEL -->
  <!-- ===================== -->

  <div
    id="modalHotel"
    class="modal"
  >

    <div class="modal-content">

      <h3>
        Novo hotel
      </h3>

      <input
        id="novoNome"
        placeholder="Nome"
      />

      <input
        id="novaRegiao"
        placeholder="Região"
      />

      <input
        id="novoEndereco"
        placeholder="Endereço"
      />

      <input
        id="novasCoords"
        placeholder="Lat,Lng"
      />

      <div class="modal-actions">

        <button id="btn-fechar-modal">
          Cancelar
        </button>

        <button id="btn-salvar-hotel">
          Salvar
        </button>

      </div>

    </div>

  </div>

  <script
    type="module"
    src="./main.js"
  ></script>

</body>

</html>
