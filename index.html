<!doctype html>
<html lang="pt-BR">

<head>

  <meta charset="utf-8"/>

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      maximum-scale=1,
      user-scalable=0
    "
  />

  <title>Rota Búzios</title>

  <meta
    name="theme-color"
    content="#0b63b7"
  />

  <link
    rel="manifest"
    href="manifest.json"
  />

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="style.css"
  />

  <!-- LEAFLET -->

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <!-- SORTABLE -->

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <!-- LUCIDE -->

  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- JSPDF -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

  <div class="app">

    <!-- HEADER -->

    <header>

      <h1>

        <i data-lucide="map"></i>

        Rota Búzios

      </h1>

      <div class="status-badge">

        Offline PWA

      </div>

    </header>

    <!-- ========================= -->
    <!-- TELA SELEÇÃO -->
    <!-- ========================= -->

    <section id="screen-select">

      <!-- CONTROLES -->

      <section class="card sticky-top">

        <div class="controls">

          <button id="btn-generate">

            <i data-lucide="route"></i>

            Criar rota

          </button>

          <button
            id="btn-reset"
            class="ghost"
          >

            <i data-lucide="trash-2"></i>

            Limpar

          </button>

        </div>

      </section>

      <!-- HOTÉIS -->

      <section class="card hotels-card">

        <!-- AÇÕES -->

        <div class="hotel-actions">

          <button id="btn-add-hotel">

            <i data-lucide="plus"></i>

            Add

          </button>

          <button
            id="btn-edit-hotel"
            class="ghost"
          >

            <i data-lucide="pencil"></i>

            Edit

          </button>

          <button
            id="btn-remove-hotel"
            class="danger"
          >

            <i data-lucide="trash"></i>

            Remover

          </button>

        </div>

        <!-- BUSCA -->

        <div class="search-area">

          <input
            type="text"
            id="searchHotel"
            placeholder="Pesquisar hotel..."
          />

        </div>

        <!-- LISTA -->

        <div class="hotel-scroll">

          <div
            class="list"
            id="hotelList"
          ></div>

        </div>

      </section>

    </section>

    <!-- ========================= -->
    <!-- MAPA -->
    <!-- ========================= -->

    <section class="card">

      <div
        id="map"
        class="map"
      ></div>

    </section>

    <!-- ========================= -->
    <!-- TELA ROTA -->
    <!-- ========================= -->

    <section
      id="screen-route"
      class="card hidden"
    >

      <div class="header-text">

        <strong>

          Organize a rota

        </strong>

        <div class="muted">

          Segure e arraste
          para mudar a ordem.

        </div>

      </div>

      <div class="controls">

        <button id="btn-start-route">

          <i data-lucide="play"></i>

          Iniciar viagem

        </button>

        <button
          id="btn-google"
          class="ghost"
        >

          <i data-lucide="map-pin"></i>

          Ver no Maps

        </button>

      </div>

      <div
        id="routeList"
        class="route-list"
      ></div>

      <div class="bottom-actions">

        <button
          id="btn-back"
          class="ghost"
        >

          <i data-lucide="arrow-left"></i>

          Voltar

        </button>

        <span
          class="status-badge"
          id="activeCount"
        >

          0 ativos

        </span>

      </div>

    </section>

    <!-- ========================= -->
    <!-- TELA VIAGEM -->
    <!-- ========================= -->

    <section
      id="screen-mode"
      class="card hidden"
    >

      <!-- TOPO -->

      <div class="mode-header">

        <div>

          <strong>

            Modo viagem

          </strong>

          <div class="muted">

            Registro em tempo real

          </div>

        </div>

        <button
          id="btn-finish"
          class="ghost small-btn"
        >

          Encerrar

        </button>

      </div>

      <!-- HOTEL -->

      <div id="currentHotel"></div>

      <!-- SERVIÇOS -->

      <div class="service-card">

        <label class="custom-checkbox">

          <input
            type="checkbox"
            id="chk-entrega"
          />

          <span>

            Foi feita entrega

          </span>

        </label>

        <label class="custom-checkbox">

          <input
            type="checkbox"
            id="chk-coleta"
          />

          <span>

            Foi feita coleta

          </span>

        </label>

      </div>

      <!-- FOTOS -->

      <div class="photo-card">

        <div class="photo-header">

          <strong>

            Fotos dos rols

          </strong>

        </div>

        <input
          type="file"
          id="photoInput"
          accept="image/*"
          capture="environment"
          multiple
        />

        <div
          id="photoPreview"
          class="photo-preview"
        ></div>

      </div>

      <!-- AÇÕES -->

      <div class="controls">

        <button id="btn-next">

          <i data-lucide="check-circle"></i>

          Confirmar e próximo

        </button>

      </div>

      <!-- RELATÓRIO -->

      <div class="report-header">

        <strong>

          Histórico da rota

        </strong>

        <button
          id="btn-pdf"
          class="ghost"
        >

          <i data-lucide="file-text"></i>

          PDF

        </button>

      </div>

      <div
        id="reportMode"
        class="report"
      ></div>

    </section>

    <!-- FOOTER -->

    <footer>

      Feito para PWA • Offline

    </footer>

  </div>

  <!-- LEAFLET -->

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- APP -->

  <script src="dados.js"></script>

  <script src="mapa.js"></script>

  <script src="relatorio.js"></script>

  <script src="app.js"></script>

</body>
</html>
